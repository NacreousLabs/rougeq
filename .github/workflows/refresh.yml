name: Daily data refresh

# Pings the deployed app's token-protected /api/refresh once a day so scores,
# standings, and season stats stay current without a redeploy. Set two repo
# secrets (Settings → Secrets and variables → Actions):
#   REFRESH_URL   – the site's base URL, e.g. https://puckq.up.railway.app
#   REFRESH_TOKEN – the same value as the app's REFRESH_TOKEN env var

on:
  schedule:
    - cron: "30 11 * * *" # 11:30 UTC daily (~early morning in North America)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh
        run: |
          code=$(curl -sS -o /tmp/refresh.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.REFRESH_TOKEN }}" \
            "${{ secrets.REFRESH_URL }}/api/refresh")
          echo "HTTP $code"
          cat /tmp/refresh.json || true
          echo
          test "$code" = "200"
