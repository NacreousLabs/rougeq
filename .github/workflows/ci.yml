name: CI

# Runs on every PR into master (and on master itself). This is the gate that
# catches type errors and build failures BEFORE they reach Railway — e.g. the
# kind of build break that only shows up in `next build`, not in `npm run dev`.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
